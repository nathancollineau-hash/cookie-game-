<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cookie Clicker ✨ v9</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#1a0a00; --panel:#2d1500; --gold:#f5c842; --orange:#e8750a; --cream:#fdf0d5; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }
html { height:100%; }
body {
  font-family:'Nunito',sans-serif; background:var(--bg); color:var(--cream);
  height:100dvh; max-height:100dvh; overflow:hidden;
  display:flex; flex-direction:row;
  transition:background 1.5s ease; overscroll-behavior:none;
}
#bg-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }
.bg-particles-container { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
.bg-float { position:absolute; opacity:0.15; animation:bgFloat linear infinite; pointer-events:none; }
@keyframes bgFloat {
  0%   { transform:translateY(110vh) rotate(0deg); opacity:0; }
  10%  { opacity:0.15; } 90% { opacity:0.15; }
  100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
}
body::after {
  content:''; position:fixed; inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
  pointer-events:none; z-index:999; opacity:0.3;
}
.mutation-flash { position:fixed; inset:0; pointer-events:none; z-index:350; opacity:0; transition:opacity 0.2s; }
.mutation-flash.show { opacity:0.2; }

.left-panel {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; position:relative; z-index:2; padding:16px;
  overflow:hidden; height:100dvh;
}
.counter { text-align:center; }
.cookie-count { font-family:'Fredoka One',cursive; font-size:2.6rem; color:var(--gold); text-shadow:0 0 30px rgba(245,200,66,0.5); line-height:1; }
.cps { font-size:0.82rem; color:#c49a50; margin-top:3px; }
.active-bonuses { display:flex; gap:5px; flex-wrap:wrap; justify-content:center; max-width:400px; min-height:26px; }
.bonus-pill {
  background:rgba(245,200,66,0.12); border:1.5px solid var(--gold); border-radius:20px;
  padding:3px 10px; font-size:0.7rem; font-weight:800; color:var(--gold);
  display:flex; align-items:center; gap:4px; animation:pillIn 0.3s ease;
}
@keyframes pillIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
.bonus-pill .timer { background:rgba(245,200,66,0.2); border-radius:10px; padding:1px 5px; font-size:0.62rem; }

.cookie-scene {
  position:relative; width:260px; height:260px;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.cookie-effect-glow {
  position:absolute; inset:-30px; border-radius:50%; pointer-events:none;
  transition:background 1.5s; animation:glowPulse 2.2s ease-in-out infinite;
}
@keyframes glowPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.12);opacity:0.7} }
.cookie-effect-ring {
  position:absolute; inset:-40px; border-radius:50%; border:2px solid transparent;
  pointer-events:none; transition:border-color 1.5s;
}
.cookie-effect-ring.r1 { animation:ringExp 2s ease-out infinite; }
.cookie-effect-ring.r2 { animation:ringExp 2s ease-out infinite; animation-delay:-0.7s; }
.cookie-effect-ring.r3 { animation:ringExp 2s ease-out infinite; animation-delay:-1.4s; }
@keyframes ringExp { 0%{opacity:0.9;transform:scale(1)} 100%{opacity:0;transform:scale(1.6)} }
.sparkles-container { position:absolute; inset:-70px; pointer-events:none; }
.sparkle {
  position:absolute; top:50%; left:50%; margin:-15px 0 0 -15px;
  font-size:1.1rem; animation:sparkleSpin linear infinite; opacity:0.85;
}
@keyframes sparkleSpin {
  0%   { transform:rotate(0deg) translateX(var(--sr,90px)) rotate(0deg); }
  100% { transform:rotate(360deg) translateX(var(--sr,90px)) rotate(-360deg); }
}
.cookie-wrapper { position:relative; cursor:pointer; z-index:3; touch-action:manipulation; }
.cookie {
  width:190px; height:190px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%, #c47a2e, #7d4010);
  box-shadow:0 0 0 6px #5a2d08, 0 0 60px rgba(196,122,46,0.3), inset 0 -20px 40px rgba(0,0,0,0.4);
  transition:transform 0.08s ease, box-shadow 0.4s ease, background 0.8s, filter 0.5s;
  display:flex; align-items:center; justify-content:center;
  font-size:4.8rem; position:relative; overflow:hidden;
}
.cookie::before {
  content:''; position:absolute; inset:10px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,0.14), transparent 60%);
  pointer-events:none;
}
.chip {
  position:absolute; border-radius:50%; background:rgba(50,20,0,0.55);
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.4); transition:background 0.8s; pointer-events:none;
}
.cookie-wrapper:active .cookie { transform:scale(0.91); }
.mutation-badge {
  position:absolute; top:-14px; left:50%; transform:translateX(-50%);
  background:rgba(90,45,8,0.92); color:white; font-family:'Fredoka One',cursive;
  font-size:0.6rem; padding:2px 10px; border-radius:10px; white-space:nowrap;
  letter-spacing:1px; box-shadow:0 2px 8px rgba(0,0,0,0.5); transition:background 0.8s; z-index:5;
}
.mutation-label {
  position:absolute; bottom:-22px; left:50%; transform:translateX(-50%);
  font-size:0.68rem; font-family:'Fredoka One',cursive; color:#c49a50;
  white-space:nowrap; letter-spacing:1px; transition:color 0.8s;
}

.skin-bar { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:320px; }
.skin-btn {
  width:34px; height:34px; border-radius:50%; border:2.5px solid transparent;
  cursor:pointer; font-size:1.15rem; display:flex; align-items:center; justify-content:center;
  transition:all 0.2s; background:rgba(0,0,0,0.35); position:relative;
}
.skin-btn.active { border-color:var(--gold); box-shadow:0 0 12px rgba(245,200,66,0.5); }
.skin-btn.locked { opacity:0.3; filter:grayscale(1); }
.skin-btn.lootbox-skin { border-color:#9b59b6; }

.particle {
  position:fixed; pointer-events:none; font-family:'Fredoka One',cursive;
  font-size:1.3rem; color:var(--gold); text-shadow:0 0 10px rgba(245,200,66,0.6);
  animation:floatUp 0.9s ease-out forwards; z-index:50;
}
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(0.7)} }
.crumb {
  position:fixed; width:7px; height:7px; border-radius:50%; background:#c47a2e;
  pointer-events:none; animation:crumbFly 0.6s ease-out forwards; z-index:50;
}
@keyframes crumbFly { 0%{opacity:1;transform:translate(0,0)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0.3)} }

/* LOOT BOX */
.lootbox-drop {
  position:fixed; font-size:2.8rem; pointer-events:none; z-index:300;
  animation:lootboxFall 0.7s cubic-bezier(0.22,0.61,0.36,1) forwards;
  filter:drop-shadow(0 4px 20px rgba(180,0,255,0.8));
}
@keyframes lootboxFall {
  0%   { transform:translateY(-80px) scale(0.3) rotate(-30deg); opacity:0; }
  60%  { transform:translateY(12px) scale(1.3) rotate(8deg); opacity:1; }
  100% { transform:translateY(0) scale(1) rotate(0deg); opacity:1; }
}

/* LOOT BOX POPUP */
.lootbox-popup {
  position:fixed; left:50%; top:50%;
  transform:translate(-50%,-50%) scale(0.8);
  background:linear-gradient(135deg,#1a0030,#3a0060);
  border:3px solid transparent;
  border-radius:22px;
  padding:0; z-index:600; text-align:center;
  opacity:0; pointer-events:none;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 20px 80px rgba(150,0,255,0.6);
  max-width:90vw; width:360px; overflow:hidden;
  background-clip:padding-box;
}
.lootbox-popup::before {
  content:''; position:absolute; inset:-3px; border-radius:25px;
  background:linear-gradient(135deg,#ff0080,#7700ff,#00ffff,#ff0080);
  background-size:400% 400%; animation:borderGlow 3s linear infinite;
  z-index:-1;
}
@keyframes borderGlow {
  0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}
.lootbox-popup.show { opacity:1; transform:translate(-50%,-50%) scale(1); pointer-events:all; }

/* RARITY COLORS */
.rarity-common   { --rar:#888; --rar2:#aaa; }
.rarity-uncommon { --rar:#1eff00; --rar2:#5aff40; }
.rarity-rare     { --rar:#0099ff; --rar2:#44ccff; }
.rarity-epic     { --rar:#a335ee; --rar2:#cc77ff; }
.rarity-legendary{ --rar:#ff8000; --rar2:#ffcc00; }
.rarity-mythic   { --rar:#ff0080; --rar2:#ff44cc; }

.lootbox-header {
  padding:16px 20px 0; text-align:center;
}
.lootbox-rarity-badge {
  display:inline-block; font-family:'Fredoka One',cursive; font-size:0.75rem;
  padding:4px 14px; border-radius:20px; letter-spacing:2px; text-transform:uppercase;
  background:linear-gradient(135deg, var(--rar), var(--rar2));
  color:#000; font-weight:900; margin-bottom:8px;
  box-shadow:0 0 20px var(--rar);
}
.lootbox-title { font-family:'Fredoka One',cursive; font-size:1.1rem; color:#c49a50; }

/* SLOT MACHINE REEL */
.loot-reel-container {
  position:relative; height:120px; overflow:hidden; margin:14px 20px;
  background:rgba(0,0,0,0.5); border-radius:14px;
  border:2px solid var(--rar, #888);
  box-shadow:inset 0 0 30px rgba(0,0,0,0.8), 0 0 20px var(--rar, #888);
}
.loot-reel-container::before,
.loot-reel-container::after {
  content:''; position:absolute; left:0; right:0; height:35px; z-index:5; pointer-events:none;
}
.loot-reel-container::before { top:0; background:linear-gradient(to bottom,rgba(26,0,48,1),transparent); }
.loot-reel-container::after  { bottom:0; background:linear-gradient(to top,rgba(26,0,48,1),transparent); }
.loot-reel-highlight {
  position:absolute; left:0; right:0; top:50%; transform:translateY(-50%);
  height:46px; border-top:2px solid var(--rar,#888); border-bottom:2px solid var(--rar,#888);
  background:rgba(255,255,255,0.04); z-index:3; pointer-events:none;
}
.loot-reel {
  display:flex; flex-direction:column; align-items:center;
  transition:transform 0s; will-change:transform;
}
.loot-reel-item {
  height:46px; display:flex; align-items:center; justify-content:center;
  font-size:2.2rem; flex-shrink:0; width:100%;
}

.lootbox-result { padding:0 20px 4px; }
.lootbox-result-name { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--gold); margin-bottom:4px; text-shadow:0 0 20px var(--rar,#888); }
.lootbox-result-desc { font-size:0.82rem; color:#c49a50; }
.lootbox-result-dur  { font-size:0.78rem; color:var(--orange); margin-top:6px; font-weight:800; }
.lootbox-open-btn {
  margin:14px 20px; background:linear-gradient(135deg,var(--rar),var(--rar2));
  border:none; border-radius:12px; padding:12px 28px; color:#000;
  font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer;
  min-height:44px; width:calc(100% - 40px); font-weight:900;
  box-shadow:0 4px 20px var(--rar); transition:transform 0.1s;
  margin-bottom:18px;
}
.lootbox-open-btn:active { transform:scale(0.96); }

/* LOOTBOX CHEST in loot tab */
.lootbox-chest {
  background:linear-gradient(135deg,#1a0030,#2a0050);
  border:2px solid #9b59b6; border-radius:16px; padding:12px 14px;
  display:flex; align-items:flex-start; gap:12px; cursor:pointer;
  transition:all 0.2s; position:relative; overflow:visible;
}
.lootbox-chest::before {
  content:''; position:absolute; inset:0; border-radius:14px;
  background:linear-gradient(135deg,transparent,rgba(155,89,182,0.1),transparent);
  animation:chestShimmer 2s ease-in-out infinite; pointer-events:none;
}
@keyframes chestShimmer { 0%,100%{opacity:0} 50%{opacity:1} }
.lootbox-chest:hover { border-color:#cc77ff; transform:translateY(-1px); box-shadow:0 4px 20px rgba(155,89,182,0.4); }
.lootbox-chest.on-cooldown { opacity:0.45; cursor:not-allowed; transform:none !important; }
.chest-icon { font-size:2rem; min-width:36px; text-align:center; padding-top:2px; flex-shrink:0; }
.chest-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
.chest-name { font-weight:800; font-size:0.88rem; color:#cc77ff; }
.chest-rarity { font-size:0.58rem; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; padding:2px 8px; border-radius:10px; display:inline-block; }
.chest-desc { font-size:0.66rem; color:#c49a50; line-height:1.3; }
.chest-cost {
  font-family:'Fredoka One',cursive; font-size:0.82rem; color:var(--gold);
  white-space:nowrap; margin-top:2px;
  padding:4px 10px; background:rgba(245,200,66,0.1); border-radius:8px;
  border:1px solid rgba(245,200,66,0.2); display:inline-block;
}

/* ACHIEVEMENT POPUP */
.achievement-popup {
  position:fixed; top:20px; right:20px;
  background:linear-gradient(135deg,#2d1500,#4a2000); border:2px solid var(--gold);
  border-radius:16px; padding:12px 18px; z-index:600; text-align:left; opacity:0;
  pointer-events:none; max-width:280px; transform:translateX(110%);
  transition:all 0.4s cubic-bezier(0.34,1.2,0.64,1);
  box-shadow:0 8px 30px rgba(0,0,0,0.6); display:flex; align-items:center; gap:12px;
}
.achievement-popup.show { opacity:1; transform:translateX(0); }
.ach-icon { font-size:2.2rem; flex-shrink:0; }
.ach-label { font-size:0.6rem; color:var(--orange); font-weight:800; letter-spacing:2px; text-transform:uppercase; }
.ach-name  { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--gold); }
.ach-desc  { font-size:0.72rem; color:#c49a50; margin-top:2px; }

/* RIGHT PANEL */
.right-panel {
  width:340px; height:100dvh; background:rgba(45,21,0,0.97); backdrop-filter:blur(10px);
  border-left:2px solid #3d1800; display:flex; flex-direction:column; overflow:hidden; z-index:10;
}
.shop-drag-handle { display:none; }
.shop-header {
  padding:10px 18px 8px; border-bottom:1px solid #3d1800;
  background:linear-gradient(135deg,#3d1a00,#2d1500); flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between; gap:8px;
}
.shop-title { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--gold); flex-shrink:0; }
.shop-header-stats { font-size:0.62rem; color:#c49a50; text-align:right; line-height:1.5; }
.tab-bar {
  display:grid; grid-template-columns:repeat(5,1fr);
  border-bottom:1px solid #3d1800; flex-shrink:0;
  background:rgba(0,0,0,0.15);
}
.tab {
  padding:7px 2px 6px; background:none; border:none; color:#a07840;
  font-family:'Nunito',sans-serif; font-size:0.55rem; font-weight:800;
  cursor:pointer; text-transform:uppercase; letter-spacing:0.4px;
  transition:all 0.15s; border-bottom:2px solid transparent;
  min-height:44px; white-space:nowrap; position:relative;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
}
.tab .tab-icon { font-size:1.05rem; line-height:1; }
.tab .tab-label { font-size:0.5rem; line-height:1; }
.tab:hover { color:var(--gold); background:rgba(245,200,66,0.06); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); background:rgba(245,200,66,0.1); }
.tab-row-2 { border-top:1px solid #3d1800; grid-column:1/-1; display:contents; }
.tab-notif {
  position:absolute; top:4px; right:4px; width:6px; height:6px;
  background:#ff4444; border-radius:50%; animation:notifPulse 1s infinite;
}
@keyframes notifPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.3)} }
.tab-content { display:none; flex:1; flex-direction:column; overflow:hidden; min-height:0; }
.tab-content.active { display:flex; min-height:0; }
.shop-items {
  flex:1; overflow-y:auto; overflow-x:hidden; padding:10px;
  display:flex; flex-direction:column; gap:6px;
  -webkit-overflow-scrolling:touch; min-height:0;
}
.shop-items::-webkit-scrollbar { width:3px; }
.shop-items::-webkit-scrollbar-thumb { background:#5a2d08; border-radius:2px; }
.section-label {
  font-family:'Fredoka One',cursive; font-size:0.68rem; color:var(--orange);
  letter-spacing:2px; text-transform:uppercase; padding:8px 4px 3px; margin-top:4px;
}
.section-label:first-child { margin-top:0; padding-top:3px; }
.upgrade-btn {
  background:linear-gradient(135deg,#3d1a00,#2a1000); border:1.5px solid #5a2d08;
  border-radius:12px; padding:10px 12px; cursor:pointer; transition:border-color 0.15s, opacity 0.15s;
  display:flex; align-items:center; gap:10px; text-align:left; color:var(--cream);
  position:relative; overflow:hidden; min-height:54px; width:100%;
}
.upgrade-btn:active:not(:disabled) { opacity:0.8; }
.upgrade-btn:disabled { opacity:0.32; cursor:not-allowed; }
.upgrade-btn:hover:not(:disabled) { border-color:#8a4d20; background:linear-gradient(135deg,#4d2a00,#3a1800); }
.upgrade-btn.almost-afford { border-color:#7a5020; opacity:0.6; }
.upgrade-btn.can-afford { border-color:#c47a2e; animation:upgPulse 2.5s infinite; opacity:1; }
.upgrade-btn.legendary-upg { border-color:#ff8000 !important; box-shadow:0 0 12px rgba(255,128,0,0.3); }
.upgrade-btn.mythic-upg    { border-color:#ff0080 !important; box-shadow:0 0 15px rgba(255,0,128,0.4); animation:mythicPulse 1.5s infinite !important; }
@keyframes upgPulse    { 0%,100%{box-shadow:0 0 0 0 rgba(196,122,46,0)}    50%{box-shadow:0 0 0 4px rgba(196,122,46,0.2)} }
@keyframes mythicPulse { 0%,100%{box-shadow:0 0 8px rgba(255,0,128,0.4)} 50%{box-shadow:0 0 20px rgba(255,0,128,0.7)} }
.upgrade-icon { font-size:1.8rem; min-width:34px; text-align:center; }
.upgrade-info { flex:1; min-width:0; }
.upgrade-name { font-weight:800; font-size:0.84rem; color:var(--gold); }
.upgrade-desc { font-size:0.68rem; color:#c49a50; margin-top:2px; line-height:1.3; }
.upgrade-cost { font-family:'Fredoka One',cursive; font-size:0.8rem; color:var(--gold); white-space:nowrap; }
.upgrade-owned {
  position:absolute; top:4px; right:6px; font-size:0.58rem; background:var(--orange);
  color:white; padding:1px 6px; border-radius:10px; font-weight:800;
}
.upgrade-tier-badge {
  position:absolute; bottom:4px; right:6px; font-size:0.52rem; padding:1px 6px; border-radius:8px; font-weight:800;
}
.tier-legendary { background:#ff8000; color:#000; }
.tier-mythic    { background:linear-gradient(135deg,#ff0080,#7700ff); color:white; }
.tier-godlike   { background:linear-gradient(135deg,#ff0080,#ffcc00,#00ffff); color:#000; animation:godlikeBadge 2s linear infinite; }
.tier-transcendent { background:linear-gradient(135deg,#ffffff,#aaffff,#ffffff); color:#000; animation:transcBadge 1s linear infinite; font-size:0.5rem; }
@keyframes godlikeBadge { 0%{filter:hue-rotate(0deg)} 100%{filter:hue-rotate(360deg)} }
@keyframes transcBadge  { 0%{filter:hue-rotate(0deg) brightness(1)} 50%{filter:hue-rotate(180deg) brightness(1.5)} 100%{filter:hue-rotate(360deg) brightness(1)} }

.skin-item {
  background:linear-gradient(135deg,#3d1a00,#2a1000); border:1.5px solid #5a2d08;
  border-radius:12px; padding:10px 12px; display:flex; align-items:center; gap:10px;
  cursor:pointer; transition:border-color 0.15s; color:var(--cream); position:relative; min-height:54px;
}
.skin-item:active:not(.skin-locked) { opacity:0.8; }
.skin-item.skin-active { border-color:var(--gold); background:rgba(245,200,66,0.07); }
.skin-item.skin-locked { opacity:0.35; cursor:not-allowed; }
.skin-item.loot-skin { border-color:#9b59b6; }
.skin-preview { width:42px; height:42px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.6rem; flex-shrink:0; }
.skin-info { flex:1; min-width:0; }
.skin-name { font-weight:800; font-size:0.84rem; color:var(--gold); }
.skin-req  { font-size:0.66rem; color:#c49a50; margin-top:2px; }
.skin-badge { font-size:0.6rem; padding:2px 8px; border-radius:10px; font-weight:800; }
.skin-badge.equipped  { background:var(--orange); color:white; }
.skin-badge.available { background:rgba(245,200,66,0.15); color:var(--gold); border:1px solid var(--gold); }
.skin-badge.locked    { background:#3d1800; color:#c49a50; }
.skin-badge.loot-lock { background:#4a0070; color:#cc77ff; border:1px solid #9b59b6; }

.ach-item {
  background:linear-gradient(135deg,#3d1a00,#2a1000); border:1.5px solid #5a2d08;
  border-radius:12px; padding:10px 12px; display:flex; align-items:center; gap:10px; min-height:54px;
}
.ach-item.unlocked { border-color:#c47a2e; }
.ach-item-icon { font-size:1.8rem; min-width:34px; text-align:center; }
.ach-item-info { flex:1; min-width:0; }
.ach-item-name { font-weight:800; font-size:0.84rem; color:var(--gold); }
.ach-item-desc { font-size:0.68rem; color:#c49a50; margin-top:2px; line-height:1.3; }
.ach-item.locked-ach .ach-item-name { color:#5a3520; }
.ach-item.locked-ach .ach-item-icon { filter:grayscale(1); opacity:0.3; }

/* LEADERBOARD */
.lb-entry {
  background:linear-gradient(135deg,#2a1000,#3a1800); border:1.5px solid #5a2d08;
  border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:10px;
  transition:border-color 0.15s;
}
.lb-entry.lb-me { border-color:var(--gold); background:rgba(245,200,66,0.07); }
.lb-rank { font-family:'Fredoka One',cursive; font-size:1.2rem; min-width:30px; text-align:center; }
.lb-avatar { font-size:1.6rem; }
.lb-info { flex:1; }
.lb-name { font-weight:800; font-size:0.84rem; color:var(--gold); }
.lb-score { font-size:0.68rem; color:#c49a50; }
.lb-badge { font-size:0.6rem; padding:2px 8px; border-radius:10px; font-weight:800; background:var(--orange); color:white; }
.lb-input-row { display:flex; gap:6px; margin-bottom:8px; }
.lb-input { flex:1; background:#1a0800; border:1.5px solid #5a2d08; border-radius:10px; color:var(--cream); font-family:'Nunito',sans-serif; font-size:0.8rem; padding:8px 10px; }
.lb-input:focus { outline:none; border-color:var(--gold); }
.lb-save-btn { background:var(--orange); border:none; border-radius:10px; color:white; font-family:'Fredoka One',cursive; font-size:0.8rem; padding:8px 14px; cursor:pointer; white-space:nowrap; }
.lb-empty { text-align:center; color:#5a3520; font-size:0.8rem; padding:20px; }

/* SAVE PANEL */
.save-card {
  background:linear-gradient(135deg,#3d1a00,#2a1000); border:1.5px solid #5a2d08;
  border-radius:14px; padding:14px; display:flex; flex-direction:column; gap:10px;
}
.save-status { font-size:0.72rem; color:#c49a50; display:flex; align-items:center; gap:6px; }
.save-dot { width:8px; height:8px; border-radius:50%; background:#39ff14; display:inline-block; animation:savePulse 2s infinite; }
.save-dot.stale { background:var(--orange); animation:none; }
@keyframes savePulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.save-btn {
  background:none; border:1.5px solid #5a2d08; border-radius:10px; color:var(--cream);
  font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:800;
  padding:9px 12px; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; gap:8px; min-height:40px; text-align:left; width:100%;
}
.save-btn:active { opacity:0.7; }
.save-btn.primary { border-color:var(--gold); color:var(--gold); }
.save-btn.danger  { border-color:#ff4444; color:#ff8888; }
.save-btn .sbi { font-size:1.2rem; }
.save-textarea {
  background:#1a0800; border:1.5px solid #5a2d08; border-radius:10px;
  color:#c49a50; font-family:monospace; font-size:0.65rem;
  padding:8px; resize:none; height:80px; width:100%; -webkit-overflow-scrolling:touch;
}
.save-info-row { display:flex; justify-content:space-between; align-items:center; font-size:0.7rem; color:#5a3520; }
.save-info-val { color:#c49a50; font-weight:800; }

.confirm-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:700;
  display:flex; align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.confirm-overlay.show { opacity:1; pointer-events:all; }
.confirm-box {
  background:linear-gradient(135deg,#2d1500,#4a2000); border:2px solid #ff4444;
  border-radius:18px; padding:24px 28px; text-align:center; max-width:280px; width:88vw;
}
.confirm-box h3 { font-family:'Fredoka One',cursive; color:#ff8888; font-size:1.2rem; margin-bottom:8px; }
.confirm-box p  { font-size:0.82rem; color:#c49a50; margin-bottom:16px; }
.confirm-btns { display:flex; gap:10px; }
.confirm-btns button { flex:1; padding:10px; border-radius:10px; font-family:'Fredoka One',cursive; font-size:0.9rem; cursor:pointer; border:none; min-height:44px; }
.confirm-yes { background:#cc2222; color:white; }
.confirm-no  { background:#3d1a00; color:var(--cream); border:1.5px solid #5a2d08; }

.toast {
  position:fixed; left:50%; transform:translateX(-50%) translateY(20px);
  background:linear-gradient(135deg,#3d1a00,#5a2d08); border:2px solid var(--gold);
  border-radius:14px; padding:10px 20px; font-family:'Fredoka One',cursive; color:var(--gold);
  font-size:0.95rem; opacity:0; transition:all 0.3s ease; pointer-events:none;
  z-index:500; text-align:center; max-width:88vw; bottom:80px;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* LOOT EXPLOSION PARTICLES */
.loot-star {
  position:fixed; pointer-events:none; font-size:1.5rem;
  animation:lootStarFly 1.2s ease-out forwards; z-index:650;
}
@keyframes lootStarFly {
  0%  { opacity:1; transform:translate(0,0) scale(1) rotate(0deg); }
  100%{ opacity:0; transform:translate(var(--lx),var(--ly)) scale(0.2) rotate(var(--lr)); }
}

/* CHEAT PANEL */
.cheat-btn {
  background:linear-gradient(135deg,#1a0030,#3a0000); border:1.5px solid #ff4444;
  border-radius:10px; color:#ff8888; font-family:'Fredoka One',cursive;
  font-size:0.82rem; padding:10px 14px; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; gap:8px; min-height:44px; width:100%;
  text-align:left;
}
.cheat-btn:hover { border-color:#ff8888; background:linear-gradient(135deg,#2a0040,#5a0000); transform:translateY(-1px); box-shadow:0 4px 15px rgba(255,0,0,0.3); }
.cheat-btn:active { transform:scale(0.97); }
.cheat-icon { font-size:1.4rem; }
.cheat-separator { height:1px; background:rgba(255,68,68,0.2); margin:4px 0; }

/* PERMANENT ANIMAL BONUSES */
.perm-bonus-bar {
  display:flex; flex-wrap:wrap; gap:4px; padding:8px;
  background:rgba(0,150,0,0.1); border:1px solid rgba(0,200,0,0.2);
  border-radius:10px; min-height:28px;
}
.perm-bonus-pill {
  background:rgba(0,200,0,0.15); border:1px solid #00cc44;
  border-radius:12px; padding:2px 8px; font-size:0.65rem; color:#00ff66;
  font-weight:800; display:flex; align-items:center; gap:3px;
}
.animal-card {
  background:linear-gradient(135deg,#2a1000,#3a1800); border:1.5px solid #5a2d08;
  border-radius:12px; padding:10px 12px; display:flex; align-items:center; gap:10px; min-height:54px;
  position:relative;
}
.animal-card.collected { border-color:#00cc44; }
.animal-card.collected.perm { border-color:#00ff88; box-shadow:0 0 10px rgba(0,255,136,0.2); }
.animal-emoji { font-size:2rem; min-width:40px; text-align:center; }
.animal-info { flex:1; }
.animal-name { font-weight:800; font-size:0.84rem; color:var(--gold); }
.animal-effect { font-size:0.68rem; color:#c49a50; margin-top:2px; }
.animal-count { position:absolute; top:4px; right:6px; font-size:0.58rem; background:#00aa44; color:white; padding:1px 6px; border-radius:10px; font-weight:800; }
.perm-star { position:absolute; bottom:4px; right:6px; font-size:0.7rem; color:#00ff88; }

/* REBIRTH */
.rebirth-btn {
  background:linear-gradient(135deg,#0a0020,#200040); border:2px solid #8800ff;
  border-radius:14px; padding:10px 70px 10px 12px; cursor:pointer; transition:all 0.2s;
  display:flex; flex-direction:column; gap:4px; width:100%; text-align:left; color:var(--cream);
  position:relative; overflow:visible; min-height:54px;
}
.rebirth-btn:hover:not(:disabled) { border-color:#cc44ff; box-shadow:0 0 20px rgba(136,0,255,0.4); transform:translateY(-2px); }
.rebirth-btn:disabled { opacity:0.35; cursor:not-allowed; }
.rebirth-btn.can-rebirth { border-color:#cc44ff; animation:rebirthPulse 2s infinite; }
@keyframes rebirthPulse { 0%,100%{box-shadow:0 0 8px rgba(136,0,255,0.4)} 50%{box-shadow:0 0 25px rgba(200,0,255,0.8)} }
.rebirth-btn.done { border-color:#00ff88; background:linear-gradient(135deg,#001a00,#003300); }
.rebirth-header { display:flex; align-items:center; gap:8px; min-width:0; }
.rebirth-header > div { min-width:0; flex:1; }
.rebirth-icon { font-size:1.6rem; flex-shrink:0; }
.rebirth-title { font-family:'Fredoka One',cursive; font-size:0.88rem; color:#cc88ff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rebirth-desc { font-size:0.68rem; color:#9966cc; }
.rebirth-cost { font-family:'Fredoka One',cursive; font-size:0.72rem; color:#aa44ff; margin-top:2px; }
.rebirth-badge-done { position:absolute; top:6px; right:8px; font-size:0.6rem; background:#00ff88; color:#000; padding:2px 8px; border-radius:10px; font-weight:800; }
.rebirth-tier-badge { position:absolute; top:50%; right:8px; transform:translateY(-50%); font-size:0.52rem; padding:2px 6px; border-radius:8px; font-weight:800; white-space:nowrap; }
.rebirth-tier-common     { background:#888; color:#000; }
.rebirth-tier-uncommon   { background:#1eff00; color:#000; }
.rebirth-tier-rare       { background:#0099ff; color:#000; }
.rebirth-tier-epic       { background:#a335ee; color:#fff; }
.rebirth-tier-legendary  { background:#ff8000; color:#000; }
.rebirth-tier-mythic     { background:linear-gradient(135deg,#ff0080,#7700ff); color:#fff; }
.rebirth-tier-godlike    { background:linear-gradient(135deg,#ff0080,#ffcc00,#00ffff); color:#000; animation:godlikeBadge 2s linear infinite; }
.rebirth-counter { background:linear-gradient(135deg,#0a0020,#300060); border:1.5px solid #8800ff; border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:6px; }
.rebirth-count-val { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#cc88ff; text-align:center; }
.rebirth-multipliers { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; }
.rebirth-mult-pill { background:rgba(136,0,255,0.2); border:1px solid #8800ff; border-radius:12px; padding:2px 10px; font-size:0.65rem; color:#cc88ff; font-weight:800; }
.rebirth-do-btn { background:linear-gradient(135deg,#4400aa,#8800ff); border:none; border-radius:12px; color:white; font-family:'Fredoka One',cursive; font-size:1rem; padding:14px; cursor:pointer; width:100%; transition:all 0.2s; margin-top:4px; }
.rebirth-do-btn:hover:not(:disabled) { background:linear-gradient(135deg,#6600cc,#aa00ff); transform:scale(1.02); box-shadow:0 0 20px rgba(136,0,255,0.5); }
.rebirth-do-btn:disabled { opacity:0.35; cursor:not-allowed; }
.rebirth-req-info { font-size:0.65rem; color:#9966cc; text-align:center; padding:4px; }

@media (min-width:700px) {
  .shop-drag-handle { display:none !important; }
  .right-panel {
    position:static; transform:none !important; height:100dvh; max-height:100dvh;
    border-top:none; border-radius:0; display:flex; flex-direction:column; overflow:hidden;
  }
  .toast { bottom:26px; }
  .achievement-popup { top:20px; right:20px; }
}
@media (max-width:699px) {
  body { flex-direction:column; overflow:hidden; }
  .left-panel { flex:1; min-height:0; padding-bottom:65px; justify-content:center; overflow:hidden; }
  .right-panel {
    position:fixed; bottom:0; left:0; right:0; width:100%; height:75dvh; max-height:75dvh;
    border-left:none; border-top:2px solid #3d1800; border-radius:20px 20px 0 0;
    transform:translateY(calc(100% - 54px)); transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1); z-index:20;
  }
  .right-panel.open { transform:translateY(0); }
  .shop-drag-handle {
    display:flex; align-items:center; justify-content:center;
    padding:7px 0 4px; cursor:pointer; flex-shrink:0; gap:8px;
  }
  .shop-drag-handle::before { content:''; width:34px; height:4px; background:#5a3520; border-radius:2px; }
  .shop-handle-label { font-family:'Fredoka One',cursive; font-size:0.7rem; color:#c49a50; letter-spacing:1px; text-transform:uppercase; }
  .cookie-count { font-size:1.9rem !important; }
  .cookie { width:155px !important; height:155px !important; font-size:3.8rem !important; }
  .cookie-scene { width:210px !important; height:210px !important; }
  .skin-btn { width:30px !important; height:30px !important; font-size:1rem !important; }
  .achievement-popup { top:auto; bottom:70px; right:10px; left:10px; max-width:100%; transform:translateY(20px); }
  .achievement-popup.show { transform:translateY(0); }
  .toast { bottom:64px; }
}
@media (max-width:380px) {
  .cookie { width:135px !important; height:135px !important; font-size:3.2rem !important; }
  .cookie-scene { width:185px !important; height:185px !important; }
  .cookie-count { font-size:1.6rem !important; }
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="bg-particles-container" id="bgParticles"></div>
<div class="mutation-flash" id="mutationFlash"></div>

<div class="left-panel">
  <div class="counter">
    <div class="cookie-count" id="cookieCount">0 🍪</div>
    <div class="cps" id="cpsDisplay">0/sec · 1/clic</div>
    <div class="cps" id="totalDisplay">0 au total</div>
  </div>
  <div class="active-bonuses" id="activeBonuses"></div>
  <div class="cookie-scene">
    <div class="cookie-effect-glow" id="effectGlow"></div>
    <div class="cookie-effect-ring r1" id="ring1"></div>
    <div class="cookie-effect-ring r2" id="ring2"></div>
    <div class="cookie-effect-ring r3" id="ring3"></div>
    <div class="sparkles-container" id="sparklesCont"></div>
    <div class="cookie-wrapper" id="cookieWrapper">
      <div class="mutation-badge" id="mutBadge">CLASSIQUE</div>
      <div class="cookie" id="bigCookie">
        🍪
        <div class="chip" style="width:17px;height:17px;top:52px;left:48px;"></div>
        <div class="chip" style="width:13px;height:13px;top:88px;left:76px;"></div>
        <div class="chip" style="width:18px;height:18px;top:66px;right:42px;"></div>
        <div class="chip" style="width:11px;height:11px;bottom:52px;left:62px;"></div>
        <div class="chip" style="width:15px;height:15px;bottom:62px;right:52px;"></div>
        <div class="chip" style="width:9px;height:9px;top:38px;left:86px;"></div>
      </div>
      <div class="mutation-label" id="mutLabel">Cookie Classique</div>
    </div>
  </div>
  <div class="skin-bar" id="skinBar"></div>
</div>

<div class="right-panel" id="rightPanel">
  <div class="shop-drag-handle" id="shopHandle" onclick="toggleShop()">
    <span class="shop-handle-label">🏪 Boutique</span>
  </div>
  <div class="shop-header">
    <div class="shop-title" id="shopTitle" onclick="secretClick()" style="cursor:default;user-select:none">🏪 Boutique</div>
    <div class="shop-header-stats" id="shopHeaderStats"></div>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('upgrades',this)"><span class="tab-icon">⚙️</span><span class="tab-label">Shop</span></button>
    <button class="tab"        onclick="switchTab('skins',this)"><span class="tab-icon">🎨</span><span class="tab-label">Skins</span></button>
    <button class="tab"        onclick="switchTab('lootboxes',this)"><span class="tab-icon">📦</span><span class="tab-label">Loot</span></button>
    <button class="tab"        onclick="switchTab('animals',this)"><span class="tab-icon">🐾</span><span class="tab-label">Animaux</span></button>
    <button class="tab"        onclick="switchTab('rebirth',this)" style="color:#cc88ff"><span class="tab-icon">🔮</span><span class="tab-label">Rebirth</span></button>
    <button class="tab"        onclick="switchTab('achievements',this)"><span class="tab-icon">🏆</span><span class="tab-label">Succès</span></button>
    <button class="tab"        onclick="switchTab('leaderboard',this)"><span class="tab-icon">👑</span><span class="tab-label">Top</span></button>
    <button class="tab"        onclick="switchTab('save',this)"><span class="tab-icon">💾</span><span class="tab-label">Sauve</span></button>
    <button class="tab"        onclick="switchTab('cheats',this)" id="cheatTab" style="display:none;color:#ff6666"><span class="tab-icon">💀</span><span class="tab-label">Triche</span></button>
    <div style="grid-column:1/-1;height:1px;background:#3d1800;display:block"></div>
  </div>
  <div class="tab-content active" id="tab-upgrades"><div class="shop-items" id="shopItems"></div></div>
  <div class="tab-content" id="tab-skins"><div class="shop-items" id="skinItems"></div></div>
  <div class="tab-content" id="tab-lootboxes"><div class="shop-items" id="lootboxItems"></div></div>
  <div class="tab-content" id="tab-animals"><div class="shop-items" id="animalItems"></div></div>
  <div class="tab-content" id="tab-rebirth"><div class="shop-items" id="rebirthItems"></div></div>
  <div class="tab-content" id="tab-achievements"><div class="shop-items" id="achievementItems"></div></div>
  <div class="tab-content" id="tab-leaderboard"><div class="shop-items" id="leaderboardItems"></div></div>
  <div class="tab-content" id="tab-cheats"><div class="shop-items" id="cheatItems"></div></div>
  <div class="tab-content" id="tab-save"><div class="shop-items" id="saveItems"></div></div>
</div>

<!-- LOOT BOX POPUP -->
<div class="lootbox-popup rarity-common" id="lootboxPopup">
  <div class="lootbox-header">
    <div class="lootbox-rarity-badge" id="lbRarityBadge">COMMUN</div>
    <div class="lootbox-title" id="lbTitle">Loot Box</div>
  </div>
  <div class="loot-reel-container" id="lootReelContainer">
    <div class="loot-reel-highlight"></div>
    <div class="loot-reel" id="lootReel"></div>
  </div>
  <div class="lootbox-result" id="lootboxResult" style="display:none">
    <div class="lootbox-result-name" id="lbResultName"></div>
    <div class="lootbox-result-desc" id="lbResultDesc"></div>
    <div class="lootbox-result-dur"  id="lbResultDur"></div>
  </div>
  <button class="lootbox-open-btn" id="lbBtn" onclick="lootboxAction()">🎲 Ouvrir !</button>
</div>

<div class="achievement-popup" id="achPopup">
  <div class="ach-icon" id="achPopIcon">🏆</div>
  <div class="ach-texts">
    <div class="ach-label">Succès débloqué !</div>
    <div class="ach-name" id="achPopName">Titre</div>
    <div class="ach-desc" id="achPopDesc">Description</div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>⚠️ Supprimer ?</h3>
    <p>Toute ta progression sera perdue définitivement !</p>
    <div class="confirm-btns">
      <button class="confirm-yes" onclick="confirmReset()">Oui, effacer</button>
      <button class="confirm-no"  onclick="closeConfirm()">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let cookies=0, totalCookies=0;
let cookiesPerClick=1, cookiesPerSecond=0;
let activeSkin='classic';
let currentMutation=null;
let activeBonuses=[];
let clickCount=0;

// REBIRTH

const REBIRTH_UPGRADES=[
  {id:'r1', name:'Éveil du Boulanger',    icon:'🌱',desc:'CPS × 2',                       cost:1e8,   effect:{cpsMult:2},              tier:'common',       req:0},

  {id:'r6', name:'Révélation Cosmique',   icon:'🌌',desc:'Coffres -50% prix',             cost:5e11,  effect:{lootCostMult:0.5},       tier:'epic',         req:5},
  {id:'r7', name:'Transcendance',         icon:'🔮',desc:'CPS × 25 + CPC × 20',          cost:1e13,  effect:{cpsMult:25,cpcMult:20},  tier:'legendary',    req:6},
  {id:'r8', name:'Omnipotence',           icon:'💫',desc:'CPS × 100 + départ 100M',       cost:1e15,  effect:{cpsMult:100,startCookies:1e8},tier:'mythic',  req:7},

function fmt(n){
  if(n>=1e24) return (n/1e24).toFixed(1)+' Sx';
  if(n>=1e21) return (n/1e21).toFixed(1)+' Qi';
  if(n>=1e18) return (n/1e18).toFixed(1)+' Qa';
  if(n>=1e15) return (n/1e15).toFixed(1)+' Qd';
  if(n>=1e12) return (n/1e12).toFixed(1)+' T';
  if(n>=1e9)  return (n/1e9).toFixed(1)+' Md';
  if(n>=1e6)  return (n/1e6).toFixed(1)+' M';
  if(n>=1e3)  return (n/1e3).toFixed(1)+' k';
  return Math.floor(n)+'';
}
function getCost(u){return Math.floor(u.baseCost*Math.pow(1.15,u.owned));}
function effCpsMult(){
  const now=Date.now();let m=currentMutation?currentMutation.cpsMult:1;
  for(const b of activeBonuses)if((b.type==='cps'||b.type==='all')&&(b.end===0||b.end>now))m*=b.val;
  return m;
}
function effCpcMult(){
  const now=Date.now();let m=currentMutation?currentMutation.cpcMult:1;
  for(const b of activeBonuses)if((b.type==='cpc'||b.type==='all')&&(b.end===0||b.end>now))m*=b.val;
  return m;
}
function rollRarity(pool){
  const entries=pool.map(item=>({item,rar:RARITIES[item.rarity]}));
  const total=entries.reduce((s,e)=>s+e.rar.weight,0);
  let r=Math.random()*total;
  for(const e of entries){r-=e.rar.weight;if(r<=0)return e.item;}
  return entries[entries.length-1].item;
}

const cvs=document.getElementById('bg-canvas'),ctx=cvs.getContext('2d');let stars=[];
function initCanvas(){cvs.width=innerWidth;cvs.height=innerHeight;stars=Array.from({length:80},()=>({x:Math.random()*cvs.width,y:Math.random()*cvs.height,r:Math.random()*1.5+0.3,a:Math.random(),da:(Math.random()-.5)*.006,col:`hsl(${30+Math.random()*60},80%,70%)`}));}
function drawBg(){ctx.clearRect(0,0,cvs.width,cvs.height);for(const s of stars){s.a=Math.max(0.04,Math.min(0.65,s.a+s.da));if(s.a<=0.04||s.a>=0.65)s.da*=-1;ctx.globalAlpha=s.a*0.28;ctx.fillStyle=s.col;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();}}
setInterval(drawBg,60);initCanvas();addEventListener('resize',initCanvas);

function selectSkin(id){

  if(skin.loot&&!unlockedSkinIds.has(id))return;
  if(!skin.loot&&totalCookies<skin.unlockAt)return;
  activeSkin=id;applySkin(id);renderSkinBar();renderSkins();
}

let _skinBarBuilt=false;
function renderSkinBar(){
  const bar=document.getElementById('skinBar');
  if(!_skinBarBuilt){
    bar.innerHTML='';
    for(const skin of SKINS){
      const ok=skin.loot?unlockedSkinIds.has(skin.id):totalCookies>=skin.unlockAt;
      const btn=document.createElement('button');btn.id='skinbtn-'+skin.id;
      btn.className='skin-btn'+(activeSkin===skin.id?' active':'')+(ok?'':' locked')+(skin.loot?' lootbox-skin':'');
      btn.title=skin.name+(ok?'':skin.loot?' (🎲 Loot Box)':' (🔒 '+fmt(skin.unlockAt)+')');btn.textContent=skin.emoji;
      if(ok)btn.onclick=()=>selectSkin(skin.id);bar.appendChild(btn);
    }
    _skinBarBuilt=true;
  } else {
    for(const skin of SKINS){
      const btn=document.getElementById('skinbtn-'+skin.id);if(!btn)continue;
      const ok=skin.loot?unlockedSkinIds.has(skin.id):totalCookies>=skin.unlockAt;
      if(ok&&btn.classList.contains('locked')){btn.classList.remove('locked');btn.onclick=()=>selectSkin(skin.id);}
      btn.classList.toggle('active',activeSkin===skin.id);
    }
  }
}

function renderLootboxes(){
  const cont=document.getElementById('lootboxItems');
  let h='<div class="section-label">📦 Coffres à Ouvrir</div>';
  const now=Date.now();
  for(const chest of LOOT_CHESTS){
    const canAfford=cookies>=chest.cost;
    const cd=lootboxCooldowns[chest.id]||0;
    const onCd=now-cd<chest.cooldown;
    const cdRemain=onCd?Math.ceil((chest.cooldown-(now-cd))/1000):0;
    // Min rarity display
    const rarKeys=Object.keys(RARITIES);
    const maxRar=chest.pool.map(i=>i.rarity).sort((a,b)=>rarKeys.indexOf(b)-rarKeys.indexOf(a))[0];
    const rarObj=RARITIES[maxRar];
    const canOpen=!onCd&&canAfford;
    h+=`<div class="lootbox-chest ${onCd?'on-cooldown':''} ${!canAfford&&!onCd?'on-cooldown':''}"
      onclick="${canOpen?`openLootbox('${chest.id}')`:''}"
      style="cursor:${canOpen?'pointer':'not-allowed'}">
      <div class="chest-icon">${chest.emoji}</div>
      <div class="chest-info">
        <div class="chest-name">${chest.name}</div>
        <span class="chest-rarity" style="background:${rarObj.color};color:#000;font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:2px">Jusqu'à ${rarObj.name}</span>
        <div class="chest-desc" style="margin-top:3px">${chest.desc}</div>
        <div class="chest-cost">${onCd?`⏱ Recharge: ${cdRemain}s`:!canAfford?`❌ 🍪 ${fmt(chest.cost)} (manque ${fmt(chest.cost-cookies)})`:`🍪 ${fmt(chest.cost)}`}</div>
      </div>
    </div>`;
  }
  h+='<div class="section-label">📊 Statistiques Loot</div>';
  h+=`<div class="save-card" style="gap:6px">
    <div class="save-info-row"><span>Coffres ouverts</span><span class="save-info-val">${totalLootOpened}</span></div>
    <div class="save-info-row"><span>Loots épiques+</span><span class="save-info-val" style="color:#a335ee">${epicLootCount}</span></div>
    <div class="save-info-row"><span>Loots mythiques</span><span class="save-info-val" style="color:#ff0080">${mythicLootCount}</span></div>
    <div class="save-info-row"><span>Skins obtenus</span><span class="save-info-val" style="color:#cc77ff">${lootSkinCount}</span></div>
  </div>`;
  cont.innerHTML=h;
}

function openLootbox(chestId){
  const chest=LOOT_CHESTS.find(c=>c.id===chestId);
  if(!chest)return;
  const now=Date.now();
  if(now-(lootboxCooldowns[chestId]||0)<chest.cooldown){showToast('⏱ Ce coffre est en recharge !');return;}
  if(cookies<chest.cost){showToast('❌ Pas assez de cookies !');return;}
  cookies-=chest.cost;
  totalLootOpened++;
  // Roll the loot
  const result=rollRarity(chest.pool);
  pendingLootbox={chest,result};
  // Show popup with reel animation
  showLootboxPopup(chest,result);
  renderLootboxes();
  updateDisplay();
}

function showLootboxPopup(chest, result){
  const rar=RARITIES[result.rarity];
  const popup=document.getElementById('lootboxPopup');
  popup.className=`lootbox-popup ${RARITIES[result.rarity].class}`;
  document.getElementById('lbRarityBadge').textContent=rar.name;
  document.getElementById('lbTitle').textContent=chest.name;
  document.getElementById('lootboxResult').style.display='none';
  document.getElementById('lbBtn').textContent='🎲 En cours...';
  document.getElementById('lbBtn').disabled=true;
  // Build reel — all animals + result
  const allItems=[...chest.pool];
  // Shuffle many times + end on result
  const reelItems=[];
  for(let i=0;i<30;i++)reelItems.push(allItems[Math.floor(Math.random()*allItems.length)]);
  reelItems.push(result);
  const reel=document.getElementById('lootReel');
  reel.style.transition='none';
  reel.style.transform='translateY(0)';
  reel.innerHTML='';
  // Pre-populate
  const totalItems=reelItems.length+5;
  const shuffledPre=[];
  for(let i=0;i<5;i++)shuffledPre.push(allItems[Math.floor(Math.random()*allItems.length)]);
  [...shuffledPre,...reelItems].forEach(item=>{
    const div=document.createElement('div');
    div.className='loot-reel-item';div.textContent=item.emoji;
    reel.appendChild(div);
  });
  popup.classList.add('show');
  lootboxReeling=true;
  // Animate scroll
  const itemH=46;
  const totalItemsInReel=reel.children.length;
  const targetIdx=totalItemsInReel-1; // last item = result
  const targetY=-(targetIdx*itemH)+(120/2)-(itemH/2); // center it
  setTimeout(()=>{
    reel.style.transition=`transform 3s cubic-bezier(0.1,0,0.2,1)`;
    reel.style.transform=`translateY(${targetY}px)`;
  },50);
  setTimeout(()=>{
    lootboxReeling=false;
    // Update reel container glow
    document.getElementById('lootReelContainer').style.boxShadow=`inset 0 0 30px rgba(0,0,0,0.8), 0 0 30px ${rar.glow}`;
    // Show result
    document.getElementById('lootboxResult').style.display='block';
    document.getElementById('lbResultName').textContent=result.name;
    document.getElementById('lbResultDesc').textContent=result.desc;
    document.getElementById('lbResultDur').textContent=result.dur>0?`⏱ ${result.dur} secondes`:(result.type==='skin'?'🎨 Skin débloqué !':'⚡ Effet instantané !');
    document.getElementById('lbBtn').textContent='🎉 Réclamer !';
    document.getElementById('lbBtn').disabled=false;
    // Spawn stars
    spawnLootStars(rar);
  },3200);
}

function spawnLootStars(rar){
  for(let i=0;i<20;i++){
    setTimeout(()=>{
      const s=document.createElement('div');s.className='loot-star';
      const ang=Math.random()*Math.PI*2;const d=80+Math.random()*200;
      s.style.cssText=`left:50%;top:50%;--lx:${Math.cos(ang)*d}px;--ly:${Math.sin(ang)*d}px;--lr:${(Math.random()-.5)*720}deg;color:${rar.color}`;
      s.textContent=['✨','⭐','💫','🌟'][Math.floor(Math.random()*4)];
      document.body.appendChild(s);setTimeout(()=>s.remove(),1200);
    },i*40);

}

function lootboxAction(){
  if(lootboxReeling||!pendingLootbox)return;
  const {result}=pendingLootbox;
  const now=Date.now();
  const chestId=pendingLootbox.chest.id;
  lootboxCooldowns[chestId]=now;
  // Count for stats
  if(result.rarity==='epic'||result.rarity==='legendary')epicLootCount++;
  if(result.rarity==='mythic')mythicLootCount++;
  // Apply
  if(result.type==='bonus'){
    cookies+=result.val;totalCookies+=result.val;
    showToast(`${result.emoji} +${fmt(result.val)} cookies !`);
    updateDisplay();
  } else if(result.type==='skin'){
    lootSkinCount++;
    unlockedSkinIds.add(result.skinId);
    showToast(`🎨 Skin "${result.name}" débloqué !`);
    renderSkinBar();renderSkins();
  } else if(result.permanent){
    // Permanent animal bonus
    applyPermanentAnimal(result);
  } else {
    const end=result.dur>0?now+result.dur*1000:0;
    activeBonuses.push({...result,end,uid:result.name+'_'+now});
    showToast(`${result.emoji} ${result.name} activé !`);
  }
  // Spawn drop
  const el=document.createElement('div');el.className='lootbox-drop';el.textContent=result.emoji;
  el.style.left=Math.random()*60+20+'vw';el.style.top='10vh';
  document.body.appendChild(el);setTimeout(()=>el.remove(),1400);
  pendingLootbox=null;
  document.getElementById('lootboxPopup').classList.remove('show');
  document.getElementById('lootReelContainer').style.boxShadow='';
  renderLootboxes();checkAchievements();
}

let permCpsMult=1, permCpcMult=1, hasChienClicker=false, has67=false;
let dogAutoClickInterval=null;

function applyPermanentAnimal(result){
  const key=result.name;
  if(!collectedAnimals[key]){
    collectedAnimals[key]={emoji:result.emoji,name:result.name,desc:result.desc,count:0,type:result.type,val:result.val};
  }
  collectedAnimals[key].count++;
  // Apply the permanent bonus
  if(result.type==='perm_cps'){
    cookiesPerSecond*=result.val;
    permCpsMult*=result.val;
    showToast(`${result.emoji} ${result.name} rejoint ta collection ! CPS × ${result.val} permanent !`);
  } else if(result.type==='perm_cpc'){
    cookiesPerClick*=result.val;
    permCpcMult*=result.val;
    showToast(`${result.emoji} ${result.name} rejoint ta collection ! Clics × ${result.val} permanent !`);
  } else if(result.type==='perm_all'){
    cookiesPerSecond*=result.val;cookiesPerClick*=result.val;
    permCpsMult*=result.val;permCpcMult*=result.val;
    showToast(`${result.emoji} ${result.name} rejoint ta collection ! Tout × ${result.val} permanent !`);
  } else if(result.type==='perm_67'){
    cookiesPerSecond*=result.val;
    cookiesPerClick+=result.cpcBonus||0;
    permCpsMult*=result.val;
    has67=true;
    showToast(`6️⃣7️⃣ 67 rejoint ta collection ! CPS × 67 + ${result.cpcBonus} cpc permanent !!!`);
  } else if(result.type==='perm_dog'){
    cookiesPerClick*=result.val;
    permCpcMult*=result.val;
    hasChienClicker=true;
    startDogAutoClick();
    showToast(`🐕 Chien Clicker rejoint ta collection ! Clics × ${result.val} + auto-click !!!`);
  }
  updateDisplay();
  // Big visual flash
  const flash=document.getElementById('mutationFlash');
  flash.style.background='#00ff88';flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),500);
}

function startDogAutoClick(){
  clearInterval(dogAutoClickInterval);
  if(!hasChienClicker)return;
  dogAutoClickInterval=setInterval(()=>{
    const earned=cookiesPerClick*effCpcMult()*0.5; // auto-click = 0.5 power
    cookies+=earned;totalCookies+=earned;

}

      ${!found?'<div style="font-size:0.7rem;color:#5a3520">🔒</div>':''}

function calcRebirthBonus(){
  rebirthBonus={cpsMult:1,cpcMult:1,startCookies:0,lootCostMult:1};
  for(const r of REBIRTH_UPGRADES){
    if(!unlockedRebirths.has(r.id))continue;
    if(r.effect.cpsMult)    rebirthBonus.cpsMult    *= r.effect.cpsMult;
    if(r.effect.cpcMult)    rebirthBonus.cpcMult    *= r.effect.cpcMult;
    if(r.effect.startCookies)rebirthBonus.startCookies = Math.max(rebirthBonus.startCookies, r.effect.startCookies);
    if(r.effect.lootCostMult)rebirthBonus.lootCostMult *= r.effect.lootCostMult;
  }
}

function buyRebirthUpgrade(id){
  const r=REBIRTH_UPGRADES.find(x=>x.id===id);
  if(!r||unlockedRebirths.has(r.id))return;
  if(rebirthCount<r.req){showToast(`🔮 Requiert ${r.req} rebirth(s) !`);return;}
  if(totalCookies<r.cost){showToast(`❌ Pas assez de cookies (total cumulé) !`);return;}
  unlockedRebirths.add(r.id);
  calcRebirthBonus();
  showToast(`🔮 ${r.name} débloqué ! ${r.desc}`);
  const flash=document.getElementById('mutationFlash');
  flash.style.background='#8800ff';flash.classList.add('show');
  setTimeout(()=>flash.classList.remove('show'),600);
  renderRebirth();checkAchievements();updateDisplay();saveGame();
}

let mutTimer=null,mutEnd=null;
function triggerMutation(){
  const pool=[];MUTATIONS.forEach(m=>{const w=m.id==='normal'?55:1;for(let k=0;k<w;k++)pool.push(m);});
  applyMutation(pool[Math.floor(Math.random()*pool.length)]);
}
function applyMutation(m){
  currentMutation=m;
  const flash=document.getElementById('mutationFlash');flash.style.background=m.color;flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),350);
  document.body.style.background=m.bgColor;
  document.querySelector('.left-panel').style.background=m.bgGrad;
  const badge=document.getElementById('mutBadge');badge.textContent=m.name;badge.style.background=m.badgeBg;
  document.getElementById('mutLabel').textContent=m.label;document.getElementById('mutLabel').style.color=m.color;
  updateBgParticles(m.particle);
  clearTimeout(mutTimer);mutEnd=null;
  if(m.dur){mutEnd=Date.now()+m.dur*1000;mutTimer=setTimeout(()=>{applyMutation(MUTATIONS[0]);mutEnd=null;},m.dur*1000);if(m.id!=='normal')showToast(`✨ Mutation ${m.name} ! (${m.dur}s)`);}
  checkAchievements();
}
function scheduleMutation(){setTimeout(()=>{triggerMutation();scheduleMutation();},18000+Math.random()*25000);}

// ══════════════════════════════════════════════
// LOOT BOX DROP ON CLICK (replaces random animals)
// ══════════════════════════════════════════════
function checkLootDrop(e){
  clickCount++;
  const now=Date.now();
  // Only check for drop every 30 clicks to avoid spam
  if(clickCount%30!==0)return;
  for(let i=0;i<LOOT_CHESTS.length;i++){
    const chest=LOOT_CHESTS[i];
    if(now-(lootboxCooldowns[chest.id+'_drop']||0)<120000)continue; // 2 min cooldown per notification
    // Earlier chests have higher drop notification chance; use index+1 to avoid div by zero
    const chance=0.012/(i+1)+0.003;
    if(Math.random()<chance){
      lootboxCooldowns[chest.id+'_drop']=now;
      const el=document.createElement('div');el.className='lootbox-drop';el.textContent=chest.emoji;
      el.style.left=(e.clientX-20)+'px';el.style.top=(e.clientY-50)+'px';
      document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
      showToast(`📦 Un ${chest.name} disponible en onglet Loot !`);
      break;
    }
  }
}

function buildShop(){
  const cont=document.getElementById('shopItems');
  const cursors=UPGRADES.filter(u=>u.id.startsWith('cursor'));
  const production=UPGRADES.filter(u=>!u.id.startsWith('cursor'));
  const tierClass=t=>t==='transcendent'?'mythic-upg':t==='godlike'?'mythic-upg':t?t+'-upg':'';
  let h='<div class="section-label">⚙️ Améliorations Clics</div>';
  for(const u of cursors){
    const cost=getCost(u),ok=cookies>=cost;
    const tc=tierClass(u.tier);
    h+=`<button class="upgrade-btn ${tc?tc+' ':''}${ok?'can-afford':''}" id="upg-${u.id}" ${ok?'':'disabled'} onclick="buyUpgrade('${u.id}')">
      <span class="upgrade-icon">${u.icon}</span>
      <div class="upgrade-info"><div class="upgrade-name">${u.name}</div><div class="upgrade-desc">${u.desc}</div><div class="upgrade-cost" id="uc-${u.id}">🍪 ${fmt(cost)}</div></div>
      <div class="upgrade-owned" id="uo-${u.id}" style="${u.owned>0?'':'display:none'}">&times;${u.owned}</div>
      ${u.tier?`<div class="upgrade-tier-badge tier-${u.tier}">${u.tier.toUpperCase()}</div>`:''}
    </button>`;
  }
  h+='<div class="section-label">🏭 Production Auto</div>';
  for(const u of production){
    const cost=getCost(u),ok=cookies>=cost;
    const tc=tierClass(u.tier);
    h+=`<button class="upgrade-btn ${tc?tc+' ':''}${ok?'can-afford':''}" id="upg-${u.id}" ${ok?'':'disabled'} onclick="buyUpgrade('${u.id}')">
      <span class="upgrade-icon">${u.icon}</span>
      <div class="upgrade-info"><div class="upgrade-name">${u.name}</div><div class="upgrade-desc">${u.desc}</div><div class="upgrade-cost" id="uc-${u.id}">🍪 ${fmt(cost)}</div></div>
      <div class="upgrade-owned" id="uo-${u.id}" style="${u.owned>0?'':'display:none'}">&times;${u.owned}</div>
      ${u.tier?`<div class="upgrade-tier-badge tier-${u.tier}">${u.tier.toUpperCase()}</div>`:''}
    </button>`;
  }
  cont.innerHTML=h;_shopBuilt=true;
}
function updateShopState(){
  if(!_shopBuilt){buildShop();return;}
  for(const u of UPGRADES){
    const btn=document.getElementById('upg-'+u.id);if(!btn)continue;
    const cost=getCost(u),ok=cookies>=cost,almost=!ok&&cookies>=cost*0.5;
    btn.disabled=!ok;
    btn.classList.toggle('can-afford',ok);
    btn.classList.toggle('almost-afford',almost&&!ok);
    const ce=document.getElementById('uc-'+u.id);if(ce)ce.textContent='🍪 '+fmt(cost);
    const oe=document.getElementById('uo-'+u.id);if(oe){oe.textContent='\u00d7'+u.owned;oe.style.display=u.owned>0?'':'none';}
  }
}
function buyUpgrade(id){
  const u=UPGRADES.find(x=>x.id===id);const cost=getCost(u);if(cookies<cost)return;
  cookies-=cost;u.owned++;cookiesPerClick+=u.cpc;cookiesPerSecond+=u.cps;
  updateDisplay();updateShopState();checkAchievements();
}

    rebirthCount,unlockedRebirths:[...unlockedRebirths],
    upgrades:UPGRADES.map(u=>({id:u.id,owned:u.owned})),
    achievements:[...unlockedAchievements],
    unlockedSkinIds:[...unlockedSkinIds],
    leaderboard,savedAt:Date.now()};
}
function applySaveData(d){
  cookies=d.cookies||0;totalCookies=d.totalCookies||0;cookiesPerClick=d.cookiesPerClick||1;cookiesPerSecond=d.cookiesPerSecond||0;
  activeSkin=d.activeSkin||'classic';clickCount=d.clickCount||0;
  epicLootCount=d.epicLootCount||0;mythicLootCount=d.mythicLootCount||0;lootSkinCount=d.lootSkinCount||0;totalLootOpened=d.totalLootOpened||0;
  permCpsMult=d.permCpsMult||1;permCpcMult=d.permCpcMult||1;
  hasChienClicker=d.hasChienClicker||false;has67=d.has67||false;
  if(d.collectedAnimals)collectedAnimals=d.collectedAnimals;
  if(d.lootboxCooldowns)lootboxCooldowns=d.lootboxCooldowns;
  if(d.upgrades)for(const s of d.upgrades){const u=UPGRADES.find(x=>x.id===s.id);if(u)u.owned=s.owned||0;}
  if(d.achievements)d.achievements.forEach(id=>unlockedAchievements.add(id));
  if(d.unlockedSkinIds){unlockedSkinIds=new Set(d.unlockedSkinIds);unlockedSkinIds.add('classic');}
  if(d.leaderboard)leaderboard=d.leaderboard;
  rebirthCount=d.rebirthCount||0;
  if(d.unlockedRebirths)d.unlockedRebirths.forEach(id=>unlockedRebirths.add(id));
  calcRebirthBonus();
  if(hasChienClicker)startDogAutoClick();
}
function saveGame(manual=false){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(getSaveData()));lastSaveTime=Date.now();if(manual)showToast('💾 Partie sauvegardée !');updateSaveStatus();}catch(e){if(manual)showToast('❌ Erreur de sauvegarde !');}
}
function loadGame(){
  try{const raw=localStorage.getItem(SAVE_KEY);if(!raw)return;applySaveData(JSON.parse(raw));}catch(e){}
}
function exportSave(){
  try{const str=btoa(JSON.stringify(getSaveData()));const ta=document.getElementById('saveExportTA');if(ta){ta.value=str;ta.select();}try{document.execCommand('copy');showToast('📋 Code copié !');}catch(e){showToast('📋 Copie le code !');}
  }catch(e){}
}
function importSave(){
  try{
    const ta=document.getElementById('saveImportTA');if(!ta||!ta.value.trim()){showToast('❌ Colle un code valide !');return;}
    const d=JSON.parse(atob(ta.value.trim()));if(typeof d.cookies!=='number')throw new Error();
    UPGRADES.forEach(u=>u.owned=0);unlockedAchievements.clear();lootboxCooldowns={};
    applySaveData(d);saveGame();applyMutation(MUTATIONS[0]);applySkin(activeSkin);
    _shopBuilt=false;_skinBarBuilt=false;buildShop();renderSkinBar();renderLootboxes();renderAchievements();renderLeaderboard();updateDisplay();ta.value='';showToast('✅ Partie importée !');
  }catch(e){showToast('❌ Code invalide !');}
}
function askReset(){document.getElementById('confirmOverlay').classList.add('show');}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('show');}
function confirmReset(){
  closeConfirm();try{localStorage.removeItem(SAVE_KEY);}catch(e){}
  cookies=0;totalCookies=0;cookiesPerClick=1;cookiesPerSecond=0;activeSkin='classic';clickCount=0;
  lootboxCooldowns={};activeBonuses=[];unlockedAchievements.clear();epicLootCount=0;mythicLootCount=0;lootSkinCount=0;totalLootOpened=0;
  collectedAnimals={};permCpsMult=1;permCpcMult=1;hasChienClicker=false;has67=false;
  rebirthCount=0;unlockedRebirths.clear();rebirthBonus={cpsMult:1,cpcMult:1,startCookies:0,lootCostMult:1};
  clearInterval(dogAutoClickInterval);
  unlockedSkinIds=new Set(['classic']);leaderboard=[];
  UPGRADES.forEach(u=>u.owned=0);_shopBuilt=false;_skinBarBuilt=false;
  applyMutation(MUTATIONS[0]);applySkin('classic');buildShop();renderSkinBar();renderLootboxes();renderAnimals();renderRebirth();renderAchievements();renderLeaderboard();updateDisplay();showToast('🗑️ Partie réinitialisée');renderSavePanel();
}
function updateSaveStatus(){
  const dot=document.getElementById('saveDot'),ts=document.getElementById('saveTs');if(!dot||!ts)return;
  if(!lastSaveTime){dot.className='save-dot stale';ts.textContent='Jamais sauvegardé';return;}
  const secs=Math.floor((Date.now()-lastSaveTime)/1000);dot.className='save-dot';
  ts.textContent=secs<5?'Sauvegardé !':secs<60?`Il y a ${secs}s`:`Il y a ${Math.floor(secs/60)}min`;
}
function renderSavePanel(){
  const cont=document.getElementById('saveItems');if(!cont)return;
  let storSize='—';try{const r=localStorage.getItem(SAVE_KEY);if(r)storSize=(r.length/1024).toFixed(1)+' ko';}catch(e){}
  cont.innerHTML=`
    <div class="section-label">📊 État</div>
    <div class="save-card">
      <div class="save-status"><span class="save-dot" id="saveDot"></span><span id="saveTs">…</span></div>
      <div class="save-info-row"><span>Cookies totaux</span><span class="save-info-val">${fmt(totalCookies)}</span></div>
      <div class="save-info-row"><span>Clics</span><span class="save-info-val">${clickCount.toLocaleString()}</span></div>
      <div class="save-info-row"><span>Taille</span><span class="save-info-val">${storSize}</span></div>
      <div class="save-info-row"><span>Succès</span><span class="save-info-val">${unlockedAchievements.size}/${ACHIEVEMENTS.length}</span></div>
    </div>
    <div class="section-label">⚡ Actions</div>
    <div class="save-card">
      <button class="save-btn primary" onclick="saveGame(true)"><span class="sbi">💾</span><div><div style="font-size:.82rem;font-weight:800;color:var(--gold)">Sauvegarder</div><div style="font-size:.68rem;color:#c49a50">Enregistre dans le navigateur</div></div></button>
    </div>
    <div class="section-label">📤 Export / 📥 Import</div>
    <div class="save-card">
      <textarea class="save-textarea" id="saveExportTA" placeholder="Clique Exporter…" readonly></textarea>
      <button class="save-btn primary" onclick="exportSave()"><span class="sbi">📤</span><div><div style="font-size:.82rem;font-weight:800;color:var(--gold)">Exporter</div><div style="font-size:.68rem;color:#c49a50">Copie le code</div></div></button>
    </div>
    <div class="save-card">
      <textarea class="save-textarea" id="saveImportTA" placeholder="Colle ton code ici…" style="user-select:text;-webkit-user-select:text"></textarea>
      <button class="save-btn primary" onclick="importSave()"><span class="sbi">📥</span><div><div style="font-size:.82rem;font-weight:800;color:var(--gold)">Importer</div><div style="font-size:.68rem;color:#c49a50">Charge une sauvegarde</div></div></button>
    </div>
    <div class="section-label">⚠️ Danger</div>
    <div class="save-card">
      <button class="save-btn danger" onclick="askReset()"><span class="sbi">🗑️</span><div><div style="font-size:.82rem;font-weight:800;color:#ff8888">Réinitialiser</div><div style="font-size:.68rem;color:#5a2520">Efface toute la progression</div></div></button>
    </div>`;
  updateSaveStatus();
}

window.__crumbColor='#c47a2e';window.__partColor='#f5c842';
loadGame();loadLeaderboard();
// Set milestone marker to current total so we don't re-fire milestones on load
_lastMilestone=MILESTONES.filter(m=>totalCookies>=m.val).reduce((max,m)=>Math.max(max,m.val),0);
try{const r=localStorage.getItem(SAVE_KEY);if(r){const d=JSON.parse(r);if(d.savedAt)lastSaveTime=d.savedAt;}}catch(e){}
applyMutation(MUTATIONS[0]);
applySkin(activeSkin);
buildShop();
renderSkinBar();
renderLootboxes();
renderAnimals();
renderRebirth();
renderAchievements();
renderLeaderboard();
updateBgParticles('🍪');
scheduleMutation();
updateDisplay();
setInterval(()=>saveGame(),15000);
addEventListener('visibilitychange',()=>{if(document.hidden)saveGame();});

(function(){
  const SEQ=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let pos=0;
  document.addEventListener('keydown',e=>{
    if(e.key===SEQ[pos]){pos++;if(pos===SEQ.length){pos=0;const bonus=2000000000;cookies+=bonus;totalCookies+=bonus;updateDisplay();saveGame();const flash=document.getElementById('mutationFlash');flash.style.background='#ffd700';flash.classList.add('show');setTimeout(()=>flash.classList.remove('show'),600);showToast('🎮 KONAMI CODE ! +2 milliards de cookies !!!');for(let i=0;i<30;i++){setTimeout(()=>{const span=document.createElement('span');span.className='particle';span.textContent=['🍪','⭐','✨','🌟','💫'][Math.floor(Math.random()*5)];span.style.color='#ffd700';span.style.left=(10+Math.random()*80)+'vw';span.style.top=(10+Math.random()*60)+'vh';span.style.fontSize=(1+Math.random()*2)+'rem';document.body.appendChild(span);setTimeout(()=>span.remove(),900);},i*60);}}}else{pos=e.key===SEQ[0]?1:0;}
  });
})();
